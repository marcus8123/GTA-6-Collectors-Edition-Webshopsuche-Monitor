name: GTA 6 Collector's Edition Monitor

on:
  schedule:
    # Alle 10 Minuten. GitHub führt Cron-Jobs "best effort" aus —
    # bei hoher Last kann es ein paar Minuten Verzögerung geben.
    - cron: '*/10 * * * *'
  workflow_dispatch: {}   # erlaubt einen manuellen Testlauf über den "Run workflow"-Button

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Shops prüfen
        run: python gta6_monitor_headless.py
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # Optional, falls du zusätzlich E-Mail-Alarme willst:
          # SMTP_USER: ${{ secrets.SMTP_USER }}
          # SMTP_PASS: ${{ secrets.SMTP_PASS }}
          # ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
